appId: com.anasoko.dani-generator
productName: Anasoko段位道場ジェネレーター
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,vitest.config.ts,README.md}'
  - '!{.env,.env.*,.npmrc}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!reference{,/**}'
asarUnpack:
  - '**/*.node'
win:
  executableName: anasoko-dani-generator
  icon: build/icon.ico
  target:
    - target: portable
      arch: [x64]
portable:
  artifactName: ${name}-${version}.${ext}
publish:
  provider: github
  owner: Negi0128
  repo: anasoko-dani-generator
